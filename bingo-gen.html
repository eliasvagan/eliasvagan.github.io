<!DOCTYPE html>
<html lang="no">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Elias sin magiske bingogenerator</title>
	<style>
		body {
			font-family: Georgia, "Times New Roman", serif;
			max-width: 52rem;
			margin: 2rem auto;
			padding: 0 1rem;
			line-height: 1.5;
			color: #222;
		}
		h1 {
			font-weight: 700;
			letter-spacing: -.02em;
		}
		form {
			display: flex;
			flex-direction: column;
			gap: 1.25rem;
			padding: 2rem;
			border: 2px solid #d2d2f2;
			background: #fafafa;
			border-radius: 4px;
		}
		label {
			font-weight: 600;
			margin-bottom: -.25rem;
		}
		textarea {
			width: 100%;
			padding: .75rem;
			border: 1px solid #ccc;
			border-radius: 4px;
			font-family: inherit;
			font-size: 1rem;
			resize: vertical;
			box-sizing: border-box;
		}
		input[type="range"] {
			width: 100%;
		}
		input[type="number"] {
			width: 8rem;
			padding: .5rem;
			border: 1px solid #ccc;
			border-radius: 4px;
		}
		button {
			padding: .75rem 1.5rem;
			font-size: 1.05rem;
			font-weight: 600;
			background: #222;
			color: white;
			border: none;
			border-radius: 4px;
			cursor: pointer;
		}
		button:hover {
			background: #000;
		}
		#download {
			display: inline-block;
			margin-top: 1rem;
			padding: .6rem 1.2rem;
			background: #f0f0f0;
			color: #222;
			text-decoration: none;
			border-radius: 4px;
			font-weight: 600;
		}
		#download:hover {
			background: #e0e0e0;
		}
	</style>
</head>
<body>

	<h1>Elias sin magiske bingogenerator</h1>
	<p style="max-width: 42rem; color: #555;">Fyll inn én mulighet per linje. Velg rutenettstørrelse og antall bord. Alt blir tilfeldig og unikt per ark – uten duplikater på samme kort.</p>

	<form id="form">
		<!-- 1. Overskrift (toppen av hver side) -->
		<div>
			<label for="headerTemplate">Overskriftsmal (bruk $n for nummer, f.eks. "Bord $n")</label>
			<textarea id="headerTemplate" rows="1">Bord $n</textarea>
		</div>

		<!-- 2. Underoverskrift (rett under overskriften) -->
		<div>
			<label for="subtitle">Underoverskrift (vises under overskriften)</label>
			<textarea id="subtitle" rows="2">Line og Elias sin magiske bryllupsbingo</textarea>
		</div>

		<!-- 3. Muligheter / rutenett (hovedinnholdet) -->
		<div>
			<label for="things">Muligheter (én per linje – fyller rutenettet)</label>
			<textarea id="things" rows="12" placeholder="Skriv inn ett alternativ per linje her..."></textarea>
		</div>

		<!-- 4. Regler og premier (nederst under rutenettet) -->
		<div>
			<label for="rules">Regler og premier (vises under rutenettet på hvert bord)</label>
			<textarea id="rules" rows="4">Bingo teller horisontalt, vertikalt og diagonalt.
1 rekke = 3. premie – Gullpenger
2 rekker = 2. premie – Twistpose
Fullt brett = 1. premie – valgfri drink til alle på bordet</textarea>
		</div>

		<div>
			<label id="sizePreview" for="size">Størrelse – 1×1</label>
			<input type="range" id="size" min="1" max="1" value="1" step="1">
		</div>

		<div>
			<label for="count">Antall bingoark (bord)</label>
			<input type="number" id="count" value="12" min="1" max="200">
		</div>

		<button type="submit">Generer PDF</button>
	</form>

	<a id="download" href="#" style="display: none;"></a>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
	<script>
		const form = document.getElementById('form');
		const thingsEl = document.getElementById('things');
		const rulesEl = document.getElementById('rules');
		const subtitleEl = document.getElementById('subtitle');
		const headerTemplateEl = document.getElementById('headerTemplate');
		const sizeEl = document.getElementById('size');
		const sizePreview = document.getElementById('sizePreview');
		const countEl = document.getElementById('count');
		const downloadEl = document.getElementById('download');

		const PDF_HEADING_FONT = "BingoPdfHeading";
		const HEADING_FONT_URL = "resources/fonts/Beautifully_Delicious_Script_Regular.ttf";
		let headingFontReady = null;

		function ensureHeadingFont() {
			if (!headingFontReady) {
				headingFontReady = (async () => {
					const face = new FontFace(PDF_HEADING_FONT, `url(${HEADING_FONT_URL})`);
					await face.load();
					document.fonts.add(face);
				})();
			}
			return headingFontReady;
		}

		async function renderHeadingImage(text) {
			await ensureHeadingFont();

			const fontSizePx = 64;
			const paddingX = 28;
			const paddingY = 18;
			const scale = 3;
			const canvas = document.createElement("canvas");
			const ctx = canvas.getContext("2d");
			const fontSpec = `${fontSizePx}px "${PDF_HEADING_FONT}", Georgia, serif`;

			ctx.font = fontSpec;
			const metrics = ctx.measureText(text);
			const widthPx = Math.ceil(metrics.width + paddingX * 2);
			const heightPx = Math.ceil(fontSizePx + paddingY * 2);

			canvas.width = widthPx * scale;
			canvas.height = heightPx * scale;
			ctx.scale(scale, scale);
			ctx.font = fontSpec;
			ctx.fillStyle = "#000000";
			ctx.textAlign = "center";
			ctx.textBaseline = "middle";
			ctx.fillText(text, widthPx / 2, heightPx / 2);

			return {
				dataUrl: canvas.toDataURL("image/png"),
				widthPx,
				heightPx,
			};
		}

		function drawHeading(doc, headingImage, pageWidth, margin) {
			const maxWidth = pageWidth - margin * 2;
			const widthMm = Math.min(maxWidth, headingImage.widthPx * 0.35);
			const heightMm = widthMm * (headingImage.heightPx / headingImage.widthPx);
			const x = (pageWidth - widthMm) / 2;
			const y = margin - 2;
			doc.addImage(headingImage.dataUrl, "PNG", x, y, widthMm, heightMm);
			return y + heightMm;
		}

		function negotiate(evt) {
			const text = thingsEl.value.trim();
			const items = text
				? text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0)
				: [];
			const numItems = items.length;

			let maxS = 1;
			if (numItems > 0) {
				maxS = Math.floor(Math.sqrt(numItems));
				if (maxS < 1) maxS = 1;
			}

			sizeEl.min = "1";
			sizeEl.max = String(maxS);

			const isThingsInput = evt && evt.target === thingsEl;
			let current = parseInt(sizeEl.value, 10) || 1;

			if (isThingsInput || current > maxS) {
				current = maxS;
			}
			sizeEl.value = current;

			if (numItems === 0) {
				sizePreview.textContent = "Størrelse – 1×1 (legg inn muligheter for å justere)";
			} else {
				sizePreview.textContent = `Størrelse – ${current}×${current} (${current * current} ruter, ${numItems} muligheter tilgjengelig)`;
			}
		}

		async function submit(evt) {
			evt.preventDefault();

			const text = thingsEl.value.trim();
			let items = text
				? text.split(/\r?\n/).map(l => l.trim()).filter(Boolean)
				: [];

			if (items.length === 0) {
				alert("Vennligst fyll inn noen muligheter først.");
				return;
			}

			const size = parseInt(sizeEl.value, 10);
			const count = parseInt(countEl.value, 10) || 1;
			const cellsPerCard = size * size;
			const rulesText = rulesEl.value.trim();
			const subtitleText = subtitleEl.value.trim() || "Line og Elias sin magiske bryllupsbingo";
			const headerTemplate = headerTemplateEl.value.trim() || "Bord $n";

			if (cellsPerCard > items.length) {
				alert(`For få muligheter. Du trenger minst ${cellsPerCard} for et ${size}×${size}-rutenett.`);
				return;
			}

			if (typeof window.jspdf === "undefined" || !window.jspdf.jsPDF) {
				alert("jsPDF-biblioteket ble ikke lastet. Sjekk internettforbindelsen eller prøv på nytt.");
				return;
			}

			const { jsPDF } = window.jspdf;
			const doc = new jsPDF({
				orientation: "portrait",
				unit: "mm",
				format: "a4"
			});

			const pageWidth = doc.internal.pageSize.getWidth();
			const pageHeight = doc.internal.pageSize.getHeight();
			const margin = 14;
			const headingCache = new Map();

			for (let c = 0; c < count; c++) {
				if (c > 0) doc.addPage();

				// Overskrift med mal (erstatt $n med nummer)
				const headerText = headerTemplate.replace(/\$n/g, (c + 1));
				let headingImage = headingCache.get(headerText);
				if (!headingImage) {
					try {
						headingImage = await renderHeadingImage(headerText);
						headingCache.set(headerText, headingImage);
					} catch (error) {
						alert("Kunne ikke tegne overskriften. Sjekk at fontfilen finnes og prøv på nytt.");
						return;
					}
				}
				const headingBottom = drawHeading(doc, headingImage, pageWidth, margin);

				// Underoverskrift fra textarea
				doc.setFont("helvetica", "normal");
				doc.setFontSize(10);
				doc.setTextColor(0, 0, 0);
				doc.text(subtitleText, pageWidth / 2, headingBottom + 4, { align: "center" });

				// Velg tilfeldige, unike alternativer til dette kortet
				const shuffled = [...items].sort(() => Math.random() - 0.5);
				const selected = shuffled.slice(0, cellsPerCard);

				// Bygg rutenett
				const grid = [];
				for (let i = 0; i < size; i++) {
					grid.push(selected.slice(i * size, (i + 1) * size));
				}

				// Beregn plassering og størrelse på rutenettet (kvadratiske celler)
				const gridTop = headingBottom + 12;
				const availableWidth = pageWidth - margin * 2;
				const rulesAreaHeight = 35;
				const maxGridHeight = pageHeight - gridTop - margin - rulesAreaHeight;
				const maxCellSize = 26;
				const cellSize = Math.min(
					availableWidth / size,
					maxGridHeight / size,
					maxCellSize
				);
				const gridWidth = cellSize * size;
				const gridLeft = margin + (availableWidth - gridWidth) / 2;

				// Fontstørrelse tilpasset rutenett
				let fontSize = 9.5;
				if (size >= 5) fontSize = 7.5;
				if (size >= 7) fontSize = 6;
				doc.setFontSize(fontSize);

				for (let row = 0; row < size; row++) {
					for (let col = 0; col < size; col++) {
						const x = gridLeft + col * cellSize;
						const y = gridTop + row * cellSize;

						// Cellekant
						doc.setDrawColor(80);
						doc.rect(x, y, cellSize, cellSize);

						// Tekst, sentrert og automatisk linjebryt
						const cellText = grid[row][col];
						const lines = doc.splitTextToSize(cellText, cellSize - 5);

						const textHeight = lines.length * (fontSize * 0.38);
						const textY = y + (cellSize - textHeight) / 2 + fontSize * 0.32;

						doc.setFont("helvetica", "normal");
						doc.setTextColor(30, 30, 30);
						doc.text(lines, x + cellSize / 2, textY, {
							align: "center",
							maxWidth: cellSize - 5
						});
					}
				}

				// Regler / premier under rutenettet
				const rulesStartY = gridTop + size * cellSize + 6;
				doc.setFontSize(7.5);
				doc.setTextColor(60, 60, 60);
				doc.setFont("helvetica", "normal");

				const ruleLines = rulesText.split(/\r?\n/).filter(l => l.trim().length > 0);
				let currentY = rulesStartY;
				for (const line of ruleLines) {
					const wrapped = doc.splitTextToSize(line.trim(), availableWidth * 0.92);
					doc.text(wrapped, margin + 4, currentY);
					currentY += wrapped.length * 3.3 + 1.2;
				}
			}

			// Lag nedlastbar PDF
			const pdfBlob = doc.output("blob");
			const url = URL.createObjectURL(pdfBlob);

			downloadEl.href = url;
			downloadEl.download = `bingo_bord_${new Date().toISOString().slice(0, 10)}.pdf`;
			downloadEl.style.display = "inline-block";
			downloadEl.textContent = `Last ned PDF (${count} bord • ${size}×${size})`;
		}

		// Koble til hendelser
		form.addEventListener("input", negotiate);
		form.addEventListener("submit", submit);

		// Initialiser forhåndsvisning
		negotiate();
	</script>

</body>
</html>
